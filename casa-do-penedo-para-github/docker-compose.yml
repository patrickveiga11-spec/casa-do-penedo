services:
  postgres:
    image: postgres:16-alpine
    container_name: casa-do-penedo-db
    environment:
      POSTGRES_USER: casa
      POSTGRES_PASSWORD: casa
      POSTGRES_DB: casa_do_penedo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
