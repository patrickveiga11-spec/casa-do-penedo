services:
  - type: web
    name: casa-do-penedo-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run build:api
    startCommand: npm run start:api
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: OWNER_EMAIL
        sync: false
