services:
  - type: web
    name: casa-do-penedo-api
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build:api
    startCommand: npm run start:api
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: OWNER_EMAIL
        sync: false

  - type: cron
    name: casa-do-penedo-welcome-emails
    runtime: node
    schedule: "0 8 * * *"
    buildCommand: "true"
    startCommand: >-
      curl -fsS -X POST "https://casa-do-penedo.onrender.com/cron/welcome-emails"
      -H "Authorization: Bearer ${ADMIN_PASSWORD}"
    envVars:
      - key: ADMIN_PASSWORD
        sync: false
